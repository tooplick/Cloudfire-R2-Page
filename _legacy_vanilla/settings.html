<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 — CloudDrive</title>
    <meta name="description" content="CloudDrive 系统设置">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <div class="page">
        <!-- 顶部导航 -->
        <header class="header glass">
            <div class="header-left">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    系统设置
                </div>
            </div>
            <div class="header-right">
                <span id="user-info" class="user-info"></span>
            </div>
        </header>

        <!-- 设置内容 -->
        <main class="settings-page">
            <div class="settings-container">

                <!-- 存储空间 -->
                <div class="settings-card glass">
                    <h3 class="settings-section-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                        </svg>
                        存储空间
                    </h3>
                    <div class="storage-usage">
                        <div class="storage-bar">
                            <div id="storage-bar-fill" class="storage-bar-fill" style="width: 0%"></div>
                        </div>
                        <div class="storage-info">
                            <span id="storage-used">计算中...</span>
                            <span id="storage-total"></span>
                        </div>
                    </div>
                    <div class="storage-detail" id="storage-detail"></div>
                </div>

                <!-- 上传限制 -->
                <div class="settings-card glass">
                    <h3 class="settings-section-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        上传限制
                    </h3>
                    <div class="settings-field">
                        <label>单文件大小限制</label>
                        <div class="settings-input-row">
                            <input type="number" id="set-max-file-size" class="settings-input" min="1" step="1">
                            <select id="set-max-file-size-unit" class="settings-select">
                                <option value="1048576">MB</option>
                                <option value="1073741824">GB</option>
                            </select>
                        </div>
                    </div>
                    <div class="settings-field">
                        <label>总存储空间限制</label>
                        <div class="settings-input-row">
                            <input type="number" id="set-max-storage-size" class="settings-input" min="0" step="0.1">
                            <select id="set-max-storage-size-unit" class="settings-select">
                                <option value="1073741824">GB</option>
                                <option value="1099511627776">TB</option>
                            </select>
                        </div>
                        <p class="settings-hint">设为 0 表示不限制</p>
                    </div>
                </div>

                <!-- 分片上传 -->
                <div class="settings-card glass">
                    <h3 class="settings-section-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="3" rx="2" />
                            <path d="M12 3v18" />
                            <path d="M3 12h18" />
                        </svg>
                        分片上传
                    </h3>
                    <div class="settings-field">
                        <div class="settings-switch-row">
                            <label>启用分片上传</label>
                            <label class="switch">
                                <input type="checkbox" id="set-chunk-enabled">
                                <span class="switch-slider"></span>
                            </label>
                        </div>
                    </div>
                    <div id="chunk-settings" class="chunk-settings">
                        <div class="settings-field">
                            <label>分片触发阈值</label>
                            <div class="settings-input-row">
                                <input type="number" id="set-chunk-threshold" class="settings-input" min="1" step="1">
                                <span class="settings-unit">MB</span>
                            </div>
                            <p class="settings-hint">文件超过此大小时自动使用分片上传</p>
                        </div>
                        <div class="settings-field">
                            <label>分片大小</label>
                            <div class="settings-input-row">
                                <input type="number" id="set-chunk-size" class="settings-input" min="5" step="1">
                                <span class="settings-unit">MB</span>
                            </div>
                            <p class="settings-hint">建议 5~20 MB，最小 5 MB</p>
                        </div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="settings-actions">
                    <a href="/" class="btn btn-ghost" style="margin-right: auto;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m12 19-7-7 7-7" />
                            <path d="M19 12H5" />
                        </svg>
                        返回云盘
                    </a>
                    <button id="settings-reset" class="btn btn-ghost">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                            <path d="M21 3v5h-5" />
                            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                            <path d="M8 16H3v5" />
                        </svg>
                        重置默认
                    </button>
                    <button id="settings-save" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5" />
                        </svg>
                        保存设置
                    </button>
                </div>
            </div>
        </main>

        <!-- Toast 通知 -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="/js/settings.js"></script>
</body>

</html>
