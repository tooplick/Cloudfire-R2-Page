<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudDrive — 个人云盘</title>
  <meta name="description" content="基于 Cloudflare R2 的个人云盘系统">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- 登录页面 -->
  <div id="login-page" class="page">
    <div class="login-container">
      <div class="login-card glass">
        <div class="login-header">
          <div class="login-icon">☁️</div>
          <h1>CloudDrive</h1>
          <p>个人云盘存储</p>
        </div>
        <form id="login-form" autocomplete="on">
          <div class="input-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
          </div>
          <div class="input-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
          </div>
          <div id="login-error" class="error-msg hidden"></div>
          <button type="submit" id="login-btn" class="btn btn-primary btn-full">
            <span class="btn-text">登 录</span>
            <span class="btn-loading hidden">
              <span class="spinner"></span>
            </span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- 主应用页面 -->
  <div id="app-page" class="page hidden">
    <!-- 顶部导航栏 -->
    <header class="header glass">
      <div class="header-left">
        <div class="logo">☁️ CloudDrive</div>
      </div>
      <div class="header-right">
        <span id="user-info" class="user-info"></span>
        <button id="logout-btn" class="btn btn-ghost" title="退出登录">退出</button>
      </div>
    </header>

    <!-- 工具栏 -->
    <div class="toolbar glass">
      <div class="toolbar-left">
        <nav id="breadcrumb" class="breadcrumb">
          <a href="#" data-path="" class="breadcrumb-item">根目录</a>
        </nav>
      </div>
      <div class="toolbar-right">
        <button id="btn-upload" class="btn btn-primary" title="上传文件">
          <span class="icon">📤</span> 上传
        </button>
        <button id="btn-new-folder" class="btn btn-secondary" title="新建文件夹">
          <span class="icon">📁</span> 新建文件夹
        </button>
        <div class="view-toggle">
          <button id="btn-grid-view" class="btn btn-icon active" title="网格视图">▦</button>
          <button id="btn-list-view" class="btn btn-icon" title="列表视图">☰</button>
        </div>
      </div>
    </div>

    <!-- 上传区域（拖拽） -->
    <div id="drop-zone" class="drop-zone hidden">
      <div class="drop-zone-content">
        <span class="drop-icon">📥</span>
        <p>拖拽文件到此处上传</p>
      </div>
    </div>

    <!-- 上传进度 -->
    <div id="upload-progress" class="upload-progress hidden">
      <div class="upload-progress-header">
        <span>上传进度</span>
        <button id="btn-close-progress" class="btn btn-icon btn-sm">✕</button>
      </div>
      <div id="upload-list" class="upload-list"></div>
    </div>

    <!-- 文件区域 -->
    <main class="main-content">
      <div id="loading" class="loading">
        <div class="spinner-lg"></div>
        <p>加载中...</p>
      </div>
      <div id="empty-state" class="empty-state hidden">
        <span class="empty-icon">📂</span>
        <p>此文件夹为空</p>
        <p class="text-muted">上传文件或创建文件夹以开始使用</p>
      </div>
      <div id="file-grid" class="file-grid hidden"></div>
      <div id="file-list-table" class="file-list-table hidden">
        <div class="file-list-header">
          <span class="col-name">文件名</span>
          <span class="col-size">大小</span>
          <span class="col-time">修改时间</span>
          <span class="col-actions">操作</span>
        </div>
        <div id="file-list-body" class="file-list-body"></div>
      </div>
    </main>

    <!-- 隐藏 file input -->
    <input type="file" id="file-input" multiple hidden>

    <!-- 预览模态框 -->
    <div id="preview-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content glass">
        <div class="modal-header">
          <h3 id="preview-title">预览</h3>
          <button id="preview-close" class="btn btn-icon">✕</button>
        </div>
        <div id="preview-body" class="modal-body"></div>
      </div>
    </div>

    <!-- 重命名/新建文件夹模态框 -->
    <div id="input-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content glass modal-sm">
        <div class="modal-header">
          <h3 id="input-modal-title">输入</h3>
          <button id="input-modal-close" class="btn btn-icon">✕</button>
        </div>
        <div class="modal-body">
          <div class="input-group">
            <input type="text" id="input-modal-value" placeholder="请输入" required>
          </div>
        </div>
        <div class="modal-footer">
          <button id="input-modal-cancel" class="btn btn-ghost">取消</button>
          <button id="input-modal-confirm" class="btn btn-primary">确认</button>
        </div>
      </div>
    </div>

    <!-- 确认删除模态框 -->
    <div id="confirm-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content glass modal-sm">
        <div class="modal-header">
          <h3>确认删除</h3>
          <button id="confirm-modal-close" class="btn btn-icon">✕</button>
        </div>
        <div class="modal-body">
          <p id="confirm-modal-msg">确定要删除吗？此操作不可撤销。</p>
        </div>
        <div class="modal-footer">
          <button id="confirm-modal-cancel" class="btn btn-ghost">取消</button>
          <button id="confirm-modal-ok" class="btn btn-danger">删除</button>
        </div>
      </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
